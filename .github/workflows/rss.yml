name: Build RSS feed
on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  rss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate feed.xml
        run: python gen_feed.py
      - name: Commit if changed
        run: |
          if git diff --quiet -- feed.xml; then echo "No change"; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git commit -m "chore: rebuild RSS feed [skip ci]"
          git push
